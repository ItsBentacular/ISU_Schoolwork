<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Elements</title>
    <!-- rather than defining the style within the elements below, you can define it in the head to make it more readable AND resuable-->
    <style>
        h1 {
            color: red;
            background-color: bisque;
        }

        .size30 { font-size: 30px}
        .size40 { font-size: 40px}
        .size50 { font-size: 50px}
        .size60 { font-size: 60px}

        .button_1 {
            color: red;
            border: 5px solid maroon;
            padding: 23px;
            border-radius: 53px;
        }
        .button_1:hover {
            background-color: green;
            color: white;
            border: 6px solid lime; 
        }
        .button_1:nodec {
            text-decoration: none;
        }

        #hurley {
            color: green;
            border: 15px;
        }
        

    </style>
</head>
<body>
    <h1> Welcome to my page! </h1>
    <p class = "size30"> This is a paragraph with font size 30.</p>
    <p class = "size40"> This is a paragraph with font size 40.</p>
    <p class = "size50"> This is a paragraph with font size 50.</p>
    <p class = "size60"> This is a paragraph with font size 60.</p>
    <p id = "hurley">Lorem Ipsum dos set amut in foren tens arden lorem ipsum dos set </p>
