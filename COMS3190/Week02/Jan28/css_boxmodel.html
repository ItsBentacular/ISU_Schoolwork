<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset = "UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Elements</title>
    <style>

        div{
            padding: 10px;
            border: 5px solid sienna;
            margin: 30px;
            background-color:bisque;
        }

        p {
            margin: 20px;
            border: 15px;
            padding:8px;
        }

    </style>
</head>
<body>
    <!-- css box models such as div, span, and others allow for spaced and connected boxes for words and text. -->
    <div> This box demonstrates the CSS Box Model.
        <p> This is paragraph 1 </p>
        <p> This is paragraph 2 </p>
    </div>
</body>
</html>
