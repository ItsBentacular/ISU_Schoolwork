<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM header</title>
</head>
<body>
    <h1 id ="newstyle"> Welcome to Iowa State University</h1>

    <script>
        const myHeader = document.getElementById("newstyle");
        myHeader.style.color = "yellow";
        myHeader.style.fontSize = "24px";
        myHeader.style.fontFamily = "Arial, sans-serif";
        myHeader.style.border = "3px solid black";
        myHeader.style.textAlign = "center";
        myHeader.style.backgroundColor = "red";
    </script>
</body>
</html>
