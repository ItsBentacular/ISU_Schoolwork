<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOM paragraph</title>
</head>
<body>
    <p class ="newstyle"> Welcome to Iowa State University</p>

    <script>
        const allParagraphs = document.getElementsByTagName("p");
        for(let i = 0; i < allParagraphs.length; i++) {
            if(allParagraphs[i].className === "newstyle") {
                allParagraphs[i].onclick = function() {
                    allParagraphs[i].style.backgroundColor = "red";
                    allParagraphs[i].style.fontSize += "40px";

                };
            }
        }
    </script>
</body>
</html>
